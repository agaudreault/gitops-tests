apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: testdata
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: setup
  source:
    repoURL: https://github.com/agaudreault/gitops-tests
    path: services/testdata
    targetRevision: HEAD
    helm:
      releaseName: argo-cd-testdata
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
