apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: setup
  namespace: argocd
spec:
  description: Project used to init the cluster resources
  destinations:
    - namespace: 'argocd'
      name: 'in-cluster'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceBlacklist:
    - group: argoproj.io
      kind: 'Application'
    - group: argoproj.io
      kind: 'ApplicationSet'
  sourceRepos:
    - 'https://github.com/agaudreault/gitops-tests'
