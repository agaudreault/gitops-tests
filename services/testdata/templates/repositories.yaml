  name: fake-repo-git-write-{{ $i }}
  namespace: {{ $.Values.namespace }}
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: git@github.com:fake-org/fake-repo-git-write-{{ $i }}.git
  sshPrivateKey: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
    QyNTUxOQAAACBGYWtlS2V5RGF0YUZvclRlc3RpbmdPbmx5Tm90UmVhbAAAAEBGYWtlS2V5
    RGF0YUZvclRlc3RpbmdPbmx5Tm90UmVhbEZha2VLZXlEYXRhRm9yVGVzdGluZ09ubHlOb3
    RSZWFsAAAAE2Zha2Utc3NoLWtleS13cml0ZS0wAQIDBAUGBwg=
    -----END OPENSSH PRIVATE KEY-----
{{- end }}
