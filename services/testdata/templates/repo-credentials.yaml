{{- /* Git HTTPS Read Credential Templates (10) */ -}}
{{- range $i := until (.Values.counts.gitCredsRead | int) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: fake-creds-git-read-{{ $i }}
  namespace: {{ $.Values.namespace }}
  labels:
    argocd.argoproj.io/secret-type: repo-creds
type: Opaque
stringData:
  type: git
  url: https://{{ $.Values.gitRepoBase }}-{{ $i }}
  username: fake-user-{{ $i }}
  password: fake-password-{{ randAlphaNum 16 }}
{{- end }}

{{- /* Helm HTTPS Read Credential Templates (10) */ -}}
{{- range $i := until (.Values.counts.helmCredsRead | int) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: fake-creds-helm-read-{{ $i }}
  namespace: {{ $.Values.namespace }}
  labels:
    argocd.argoproj.io/secret-type: repo-creds
type: Opaque
stringData:
  type: helm
  url: https://{{ $.Values.helmRepoBase }}-{{ $i }}
  username: fake-user-{{ $i }}
  password: fake-password-{{ randAlphaNum 16 }}
{{- end }}

{{- /* OCI Read Credential Templates (10) */ -}}
{{- range $i := until (.Values.counts.ociCredsRead | int) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: fake-creds-oci-read-{{ $i }}
  namespace: {{ $.Values.namespace }}
  labels:
    argocd.argoproj.io/secret-type: repo-creds
type: Opaque
stringData:
  type: helm
  url: {{ $.Values.ociRepoBase }}-{{ $i }}
  enableOCI: "true"
  username: fake-user-{{ $i }}
  password: fake-password-{{ randAlphaNum 16 }}
{{- end }}

{{- /* Git SSH Write Credential Templates (20) */ -}}
